; ESP32 UDP Firmware - PlatformIO Configuration
; Mimo Monitor: AI Agent Status Indicator

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    adafruit/Adafruit NeoPixel@^1.12.0
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
