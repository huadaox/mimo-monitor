<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mimo Monitor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', 'Consolas', 'Menlo', monospace; background: #0a0a0a; color: #e0e0e0; padding: 20px; min-height: 100vh; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  h1 { font-size: 18px; color: #888; }
  h1 span { color: #4fc3f7; }
  .conn-status { font-size: 12px; }
  .conn-status.ok { color: #4caf50; }
  .conn-status.err { color: #f44336; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .device-count { font-size: 11px; color: #666; background: #1a1a1a; padding: 4px 10px; border-radius: 12px; }
  .device-count b { color: #4fc3f7; }

  /* Agent Cards Grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .card {
    background: #141414; border: 1px solid #222; border-radius: 12px; padding: 18px;
    transition: border-color 0.3s, box-shadow 0.3s;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    border-radius: 12px 12px 0 0;
  }
  .card.running  { border-color: #4caf50; }  .card.running::before  { background: #4caf50; }
  .card.idle     { border-color: #ffc107; }  .card.idle::before     { background: #ffc107; }
  .card.thinking { border-color: #2196f3; }  .card.thinking::before { background: #2196f3; }
  .card.waiting  { border-color: #ff9800; }  .card.waiting::before  { background: #ff9800; }
  .card.error    { border-color: #f44336; }  .card.error::before    { background: #f44336; }
  .card.stopped  { border-color: #333; }     .card.stopped::before  { background: #333; }

  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .tool-name { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .status-badge {
    padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.8px;
  }
  .status-running  { background: #1b5e20; color: #a5d6a7; }
  .status-idle     { background: #f57f17; color: #fff9c4; }
  .status-thinking { background: #0d47a1; color: #90caf9; }
  .status-waiting  { background: #e65100; color: #ffcc80; }
  .status-error    { background: #b71c1c; color: #ef9a9a; }
  .status-stopped  { background: #212121; color: #616161; }

  .indicator { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .indicator.running  { background: #4caf50; box-shadow: 0 0 8px #4caf50; animation: pulse 1.5s infinite; }
  .indicator.idle     { background: #ffc107; }
  .indicator.thinking { background: #2196f3; animation: pulse 1s infinite; }
  .indicator.waiting  { background: #ff9800; animation: pulse 2s infinite; }
  .indicator.error    { background: #f44336; animation: pulse 0.5s infinite; }
  .indicator.stopped  { background: #333; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .detail { font-size: 11px; color: #555; margin-bottom: 10px; min-height: 16px; word-break: break-all; }
  .detail .current-tool { color: #888; }
  .detail .current-tool b { color: #4fc3f7; font-weight: 600; }

  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .stat { text-align: center; background: #0e0e0e; border-radius: 6px; padding: 6px 4px; }
  .stat-val { font-size: 16px; font-weight: 700; color: #aaa; }
  .stat-label { font-size: 9px; color: #444; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  .source-tag { font-size: 9px; color: #333; position: absolute; top: 10px; right: 12px; }

  /* Hook Event Log */
  .hook-section { margin-top: 8px; }
  .hook-title { font-size: 12px; color: #555; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .hook-title .dot { width: 6px; height: 6px; border-radius: 50%; background: #4fc3f7; animation: pulse 2s infinite; }
  .hook-log {
    background: #111; border: 1px solid #1a1a1a; border-radius: 8px;
    padding: 10px; max-height: 260px; overflow-y: auto;
    scrollbar-width: thin; scrollbar-color: #333 #111;
  }
  .hook-log::-webkit-scrollbar { width: 5px; }
  .hook-log::-webkit-scrollbar-track { background: #111; }
  .hook-log::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

  .hook-entry {
    font-size: 11px; padding: 4px 0; border-bottom: 1px solid #1a1a1a;
    display: flex; gap: 8px; align-items: baseline;
  }
  .hook-entry:last-child { border-bottom: none; }
  .hook-time { color: #333; font-size: 10px; flex-shrink: 0; width: 70px; }
  .hook-event { font-weight: 600; min-width: 80px; }
  .hook-event.tool_start  { color: #4caf50; }
  .hook-event.tool_use    { color: #2196f3; }
  .hook-event.stop        { color: #ffc107; }
  .hook-event.error       { color: #f44336; }
  .hook-event.default     { color: #888; }
  .hook-tool { color: #4fc3f7; }
  .hook-detail { color: #555; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hook-session { color: #333; font-size: 9px; }

  .empty-state { text-align: center; padding: 40px; color: #333; font-size: 13px; }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; }

  /* Footer */
  .footer {
    margin-top: 24px; padding-top: 16px; border-top: 1px solid #1a1a1a;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: #333;
  }
</style>
</head>
<body>

<div class="header">
  <h1><span>mimo</span> monitor</h1>
  <div class="header-right">
    <div class="device-count">ESP32 devices: <b id="deviceCount">0</b></div>
    <div id="conn" class="conn-status err">connecting...</div>
  </div>
</div>

<div class="grid" id="tools"></div>

<div class="hook-section">
  <div class="hook-title"><span class="dot"></span> HOOK EVENT LOG</div>
  <div class="hook-log" id="hookLog">
    <div class="empty-state"><div class="icon">📡</div>Waiting for hook events...</div>
  </div>
</div>

<div class="footer">
  <span>mimo monitor v0.2</span>
  <span id="lastUpdate">—</span>
</div>

<script>
const toolsEl = document.getElementById('tools');
const hookLogEl = document.getElementById('hookLog');
const connEl = document.getElementById('conn');
const deviceCountEl = document.getElementById('deviceCount');
const lastUpdateEl = document.getElementById('lastUpdate');

let ws, reconnectTimer;
let hookEntries = [];
const MAX_HOOK_ENTRIES = 50;

// Agent state cache (name -> full info)
const agentCache = {};

function renderCard(agent) {
  const s = agent.status || 'stopped';
  const toolDisplay = agent.current_tool || agent.tool || '';
  const detailText = agent.detail || '';
  return `
    <div class="card ${s}" id="card-${agent.name || agent.id}">
      <span class="source-tag">${agent.source || ''}</span>
      <div class="card-header">
        <span class="tool-name">
          <span class="indicator ${s}"></span>
          ${agent.name || agent.id || 'unknown'}
        </span>
        <span class="status-badge status-${s}">${s}</span>
      </div>
      <div class="detail">
        ${toolDisplay ? `<span class="current-tool">tool: <b>${escapeHtml(toolDisplay)}</b></span>` : ''}
        ${detailText ? `<br>${escapeHtml(detailText)}` : ''}
        ${!toolDisplay && !detailText ? '---' : ''}
      </div>
      <div class="stats">
        <div class="stat">
          <div class="stat-val">${agent.cpu_percent != null ? agent.cpu_percent.toFixed(1) : '-'}</div>
          <div class="stat-label">CPU%</div>
        </div>
        <div class="stat">
          <div class="stat-val">${agent.memory_mb != null ? agent.memory_mb.toFixed(0) : '-'}</div>
          <div class="stat-label">MB</div>
        </div>
        <div class="stat">
          <div class="stat-val">${agent.pid || '-'}</div>
          <div class="stat-label">PID</div>
        </div>
      </div>
    </div>`;
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function addHookEntry(entry) {
  hookEntries.unshift(entry);
  if (hookEntries.length > MAX_HOOK_ENTRIES) hookEntries.pop();
  renderHookLog();
}

function renderHookLog() {
  if (hookEntries.length === 0) {
    hookLogEl.innerHTML = '<div class="empty-state"><div class="icon">📡</div>Waiting for hook events...</div>';
    return;
  }
  hookLogEl.innerHTML = hookEntries.map(e => {
    const t = new Date(e.timestamp * 1000).toLocaleTimeString();
    const evClass = ['tool_start','tool_use','stop','error'].includes(e.event) ? e.event : 'default';
    return `<div class="hook-entry">
      <span class="hook-time">${t}</span>
      <span class="hook-event ${evClass}">${e.event || e.hook_event || ''}</span>
      <span class="hook-tool">${escapeHtml(e.tool || '')}</span>
      <span class="hook-detail">${escapeHtml(e.detail || e.status || '')}</span>
      ${e.session_id ? `<span class="hook-session">${e.session_id.substring(0,8)}</span>` : ''}
    </div>`;
  }).join('');
}

function updateCard(agent) {
  const name = agent.name || agent.id;
  agentCache[name] = { ...agentCache[name], ...agent };
  const card = document.getElementById(`card-${name}`);
  if (card) {
    card.outerHTML = renderCard(agentCache[name]);
  }
}

// Fetch hook log on load
async function fetchHookLog() {
  try {
    const res = await fetch('/api/hook/log?limit=20');
    if (res.ok) {
      const data = await res.json();
      hookEntries = data.reverse();
      renderHookLog();
    }
  } catch(e) {
    console.warn('Failed to fetch hook log:', e);
  }
}

// Fetch health info (device count)
async function fetchHealth() {
  try {
    const res = await fetch('/api/health');
    if (res.ok) {
      const data = await res.json();
      deviceCountEl.textContent = data.ws_clients || 0;
    }
  } catch(e) {}
}

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    connEl.textContent = '● connected';
    connEl.className = 'conn-status ok';
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);

    if (msg.event === 'init') {
      // Full state init
      const tools = msg.tools || [];
      if (tools.length === 0) {
        toolsEl.innerHTML = '<div class="empty-state"><div class="icon">🔍</div>No agents detected yet.<br>Start a Claude Code session to begin monitoring.</div>';
      } else {
        toolsEl.innerHTML = tools.map(t => {
          agentCache[t.name] = t;
          return renderCard(t);
        }).join('');
      }
      lastUpdateEl.textContent = 'updated ' + new Date().toLocaleTimeString();
    }
    else if (msg.event === 'status_change' || msg.event === 'external_update') {
      addHookEntry(msg);
      const agent = {
        name: msg.tool,
        status: msg.status,
        detail: msg.detail,
        current_tool: msg.tool
      };
      updateCard(agent);
      lastUpdateEl.textContent = 'updated ' + new Date(msg.timestamp * 1000).toLocaleTimeString();
    }
    else if (msg.event === 'hook_update') {
      addHookEntry(msg);
      const agent = {
        name: msg.tool,
        status: msg.status,
        detail: msg.detail,
        current_tool: msg.hook_event === 'tool_use' || msg.hook_event === 'tool_start' ? msg.tool : ''
      };
      updateCard(agent);
      lastUpdateEl.textContent = 'updated ' + new Date(msg.timestamp * 1000).toLocaleTimeString();
    }
    else if (msg.event === 'pong') {
      // keepalive response
    }
  };

  ws.onclose = () => {
    connEl.textContent = '● disconnected';
    connEl.className = 'conn-status err';
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();

  // Ping keepalive
  setInterval(() => { if (ws.readyState === 1) ws.send('ping'); }, 30000);
}

// Initial load
fetchHookLog();
fetchHealth();
setInterval(fetchHealth, 10000);
connect();
</script>
</body>
</html>
